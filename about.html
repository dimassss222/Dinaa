<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Our Memories ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

/* ================= BACKGROUND SLIDER ================= */

.slider{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 2.5s ease-in-out;
    background:#000;
}

.slide.active{
    opacity:1;
}

/* FOTO */

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* VIDEO */

.slide video{
    width:auto;
    height:90%;

    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    border-radius:25px;

    box-shadow:
        0 0 40px rgba(255,255,255,.15),
        0 25px 60px rgba(0,0,0,.6);
}

/* ================= OVERLAY ================= */

.overlay{

    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    background:rgba(0,0,0,.35);

    color:white;
}

/* JUDUL */

.overlay h1{

    font-family:'Caveat',cursive;

    font-size:8rem;

    text-shadow:
        0 0 20px rgba(255,255,255,.5),
        0 10px 40px rgba(0,0,0,.4);

    animation:fadeUp 1.5s ease;
}

/* SUBTITLE */

.overlay p{

    margin-top:10px;

    font-size:1.4rem;

    letter-spacing:2px;

    animation:fadeUp 2s ease;
}

/* BUTTON */

.overlay a{

    margin-top:35px;

    padding:15px 38px;

    border-radius:50px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:rgba(255,255,255,.15);

    border:1px solid rgba(255,255,255,.3);

    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    transition:.35s;

    animation:fadeUp 2.5s ease;
}

.overlay a:hover{

    transform:translateY(-4px) scale(1.05);

    background:rgba(255,255,255,.25);

    box-shadow:
        0 10px 35px rgba(255,255,255,.2);
}

/* ANIMASI */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* MOBILE */

@media(max-width:768px){

    .overlay h1{
        font-size:4.5rem;
    }

    .overlay p{
        font-size:1rem;
        padding:0 20px;
    }

    .overlay a{
        padding:14px 30px;
        font-size:.95rem;
    }

    .slide video{
        width:90%;
        height:auto;
    }

}

</style>
</head>

<body>

<!-- MUSIK -->

<audio autoplay loop>
    <source src="images/Instrumen Sampai Kau Bisa - Pss Sleman.mp3" type="audio/mpeg">
</audio>

<!-- SLIDER -->

<div class="slider">

    <!-- FOTO 1 -->

    <div class="slide active">
        <img src="images/ChatGPT Image 6 Jun 2026, 03.13.37.png">
    </div>

    <!-- VIDEO -->

    <div class="slide">

        <video autoplay muted loop playsinline>
            <source src="images/WhatsApp Video 2026-06-06 at 02.51.59.mp4" type="video/mp4">
        </video>

    </div>

    <!-- FOTO 2 -->

    <div class="slide">
        <img src="images/WhatsApp Image 2026-06-06 at 02.34.44 (2).jpeg">
    </div>

</div>

<!-- OVERLAY -->

<div class="overlay">

    <h1>Our Memories ❤️</h1>

    <p>
        Every moment with you becomes my favorite memory.
    </p>

    <a href="flower.html">
        💕 Next
    </a>

</div>

<script>

const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {

    slides[current].classList.remove('active');

    current++;

    if(current >= slides.length){
        current = 0;
    }

    slides[current].classList.add('active');

}, 6000);

</script>

</body>
</html>
